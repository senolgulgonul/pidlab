<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PID Simulator — Closed Loop Step Response</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* MATLAB PID Tuner-style light theme */
    --bg: #f0f0f0;            /* app background light gray */
    --panel: #f7f7f7;         /* slightly lighter for panels */
    --panel-2: #ffffff;
    --line: #c8c8c8;          /* borders */
    --line-bright: #a0a0a0;
    --text: #1a1a1a;          /* primary dark text */
    --text-dim: #4a4a4a;
    --text-faint: #6e6e6e;
    --accent: #0072BD;        /* MATLAB blue for input focus */
    --accent-3: #c0392b;      /* alerts */
    --green: #2e8b3d;         /* simulate button green */
    --green-hover: #36a347;

    /* Plot palette */
    --plot-bg: #ffffff;
    --plot-trace: #0072BD;
    --plot-grid: #e6e6e6;
    --plot-axis: #262626;
    --plot-tick: #4d4d4d;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Space Grotesk", sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before { display: none; }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 290px 1fr;
    gap: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 10px 14px 12px;
    overflow-y: auto;
    height: 100vh;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 10px;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 2px;
    background: var(--accent);
  }
  .brand h1 {
    margin: 0;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }
  .brand .ver {
    font-family: "JetBrains Mono", monospace;
    color: var(--text-faint);
    font-size: 10px;
    margin-left: auto;
  }

  .section-title {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 7px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }

  .field {
    margin-bottom: 7px;
  }
  .field label {
    display: block;
    font-size: 10.5px;
    color: var(--text-dim);
    margin-bottom: 2px;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.04em;
  }
  /* inline label (label sits to the left of the input) */
  .field.inline {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field.inline label {
    flex: 0 0 auto;
    margin-bottom: 0;
    white-space: nowrap;
  }
  .field.inline input { flex: 1 1 auto; }
  .field .hint {
    font-size: 9.5px;
    color: var(--text-faint);
    margin-top: 2px;
    font-family: "JetBrains Mono", monospace;
  }
  .field input[type="text"],
  .field input[type="number"] {
    width: 100%;
    background: #ffffff;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 3px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input[type="text"]:focus,
  .field input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,114,189,0.18);
  }
  .field input.err {
    border-color: var(--accent-3);
    box-shadow: 0 0 0 2px rgba(192,57,43,0.15);
  }

  .pid-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .pid-grid .field { margin-bottom: 0; }
  .pid-grid .field.inline { gap: 5px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row-2 .field { margin-bottom: 0; }

  .actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    background: var(--green);
    color: #ffffff;
    border: 1px solid #246b30;
    padding: 8px 12px;
    border-radius: 3px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s;
  }
  .btn:hover { background: var(--green-hover); }
  .btn:active { transform: translateY(1px); }
  .btn.secondary {
    background: #ffffff;
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ---------- Main ---------- */
  .main {
    padding: 14px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* TF display block — removed */

  /* Plot */
  .plot-card {
    background: var(--plot-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px 6px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    flex: 1;
  }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex-shrink: 0;
  }
  .metric {
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 11px;
  }
  .metric .k {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 3px;
  }
  .metric .v {
    font-family: "JetBrains Mono", monospace;
    font-size: 16px;
    color: var(--text);
    font-weight: 500;
  }
  .metric .u {
    font-size: 10px;
    color: var(--text-faint);
    margin-left: 3px;
  }

  .errbox {
    background: #fdecea;
    border: 1px solid var(--accent-3);
    color: var(--accent-3);
    padding: 6px 9px;
    border-radius: 3px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    margin-top: 8px;
    display: none;
  }
  .errbox.show { display: block; }

  /* tooltips */
  .tooltip {
    position: fixed;
    background: #262626;
    border: 1px solid #0072BD;
    color: #ffffff;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 3px;
    pointer-events: none;
    transform: translate(-50%, -120%);
    white-space: nowrap;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .tooltip.show { opacity: 1; }

  @media (max-width: 600px) {
    html, body { height: auto; overflow: auto; }
    .app { grid-template-columns: 1fr; height: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--line); height: auto; }
    .main { height: auto; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <span class="dot"></span>
      <h1>PID · Lab</h1>
    </div>

    <div class="section-title">Plant  P(s) = N(s)/D(s) · e<sup>−sL</sup></div>

    <div class="field">
      <label>Numerator N(s)</label>
      <input type="text" id="num" value="1" autocomplete="off" />
    </div>

    <div class="field">
      <label>Denominator D(s)</label>
      <input type="text" id="den" value="1 2 1" autocomplete="off" />
    </div>

    <div class="field inline">
      <label>Dead time L (s)</label>
      <input type="number" id="delay" value="0" step="0.1" min="0" />
    </div>

    <div class="pid-grid">
      <div class="field inline">
        <label>Kp</label>
        <input type="number" id="kp" value="1" step="0.1" />
      </div>
      <div class="field inline">
        <label>Ki</label>
        <input type="number" id="ki" value="0" step="0.1" />
      </div>
      <div class="field inline">
        <label>Kd</label>
        <input type="number" id="kd" value="0" step="0.1" />
      </div>
    </div>

    <div class="field inline">
      <label>Deriv. filter N</label>
      <input type="number" id="nfilt" value="100" step="10" min="1" />
    </div>

    <div class="row-2">
      <div class="field">
        <label>Stop time (s)</label>
        <input type="number" id="tstop" value="10" step="1" min="0.1" />
      </div>
      <div class="field">
        <label>Step size dt (s)</label>
        <input type="number" id="dt" value="0.01" step="0.001" min="0.0001" />
      </div>
    </div>

    <div class="field inline">
      <label>Setpoint</label>
      <input type="number" id="ref" value="1" step="0.1" />
    </div>

    <div class="actions">
      <button class="btn" id="runBtn">▶ Simulate</button>
      <button class="btn secondary" id="resetBtn">Reset</button>
    </div>

    <div class="errbox" id="errbox"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <!-- Plot -->
    <div class="plot-card">
      <canvas id="plot"></canvas>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="k">Rise time (10–90%)</div>
        <div class="v"><span id="m_rise">—</span><span class="u">s</span></div>
      </div>
      <div class="metric">
        <div class="k">Overshoot</div>
        <div class="v"><span id="m_os">—</span><span class="u">%</span></div>
      </div>
      <div class="metric">
        <div class="k">Settling time (2%)</div>
        <div class="v"><span id="m_ts">—</span><span class="u">s</span></div>
      </div>
      <div class="metric">
        <div class="k">Steady-state value</div>
        <div class="v"><span id="m_ss">—</span></div>
      </div>
      <div class="metric">
        <div class="k">SS error</div>
        <div class="v"><span id="m_err">—</span></div>
      </div>
    </div>
  </main>
</div>

<div class="tooltip" id="tip"></div>

<script>
/* =====================================================================
   PID Simulator — single page
   - Plant: P(s) = N(s)/D(s) * e^{-sL}  via state-space + delay buffer
   - Controller: C(s) = Kp + Ki/s + Kd*s/(1+s/N)   (parallel, filtered D)
   - Integration: RK4 on continuous-time closed-loop, with dead-time
     implemented as a circular ring buffer on the plant input.
   ===================================================================== */

/* ---------- Polynomial / utility helpers ---------- */
function parseCoefs(str){
  // accept "1 2 1", "[1, 2, 1]", "1,2,1", scientific notation
  if(str === undefined || str === null) return [];
  let s = String(str).trim();
  s = s.replace(/[\[\]]/g, " ").replace(/,/g, " ");
  const parts = s.split(/\s+/).filter(x => x.length);
  const out = parts.map(Number);
  if(out.some(v => !Number.isFinite(v))) throw new Error("invalid coefficient");
  return out;
}

function trimLeadingZeros(p){
  let i = 0;
  while(i < p.length-1 && Math.abs(p[i]) < 1e-15) i++;
  return p.slice(i);
}

function polyToHTML(coefs){
  // coefs in descending order of s, leftmost is highest power
  coefs = trimLeadingZeros(coefs);
  const n = coefs.length;
  if(n === 0) return "0";
  const terms = [];
  for(let i = 0; i < n; i++){
    const c = coefs[i];
    if(Math.abs(c) < 1e-12) continue;
    const power = n - 1 - i;
    const absC = Math.abs(c);
    let coefStr = "";
    if(power === 0){
      coefStr = formatNum(absC);
    } else {
      coefStr = (Math.abs(absC - 1) < 1e-12) ? "" : formatNum(absC);
    }
    let varStr = "";
    if(power === 1) varStr = "s";
    else if(power > 1) varStr = "s<sup>" + power + "</sup>";
    const sign = (terms.length === 0)
      ? (c < 0 ? "−" : "")
      : (c < 0 ? " − " : " + ");
    terms.push(sign + coefStr + varStr);
  }
  return terms.length ? terms.join("") : "0";
}

function formatNum(v){
  if(!Number.isFinite(v)) return "—";
  const a = Math.abs(v);
  if(a === 0) return "0";
  if(a >= 1000 || a < 0.001) return v.toExponential(2);
  if(Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v));
  return parseFloat(v.toFixed(4)).toString();
}

/* ---------- State-space conversion (controllable canonical form) ----------
   For P(s) = (b0 s^m + ... + bm) / (a0 s^n + ... + an), proper (m<=n).
   Normalize so a0 = 1 (denominator monic).
   Build controllable canonical form:
     A = [0  1  0 ... 0;
          0  0  1 ... 0;
          ...
          -a_n  -a_{n-1} ... -a_1 ]   (size n x n)
     B = [0;0;...;1]
     C = [bm  b_{m-1} ... b0  0 ... 0]  padded to length n
     D = 0  (strictly proper) ; if m==n we split off direct term.
---------------------------------------------------------------------------- */
function tf2ss(num, den){
  num = trimLeadingZeros(num);
  den = trimLeadingZeros(den);
  if(den.length === 0 || Math.abs(den[0]) < 1e-15) throw new Error("denominator is zero");
  // normalize
  const a0 = den[0];
  const a = den.map(v => v / a0);     // a[0]=1, a = [1, a1, a2, ..., an]
  const b = num.map(v => v / a0);     // numerator coefs

  const n = a.length - 1;             // order
  const m = b.length - 1;             // numerator degree

  if(m > n) throw new Error("plant is improper (deg N > deg D)");

  let D = 0;
  let bAdj = b.slice();
  if(m === n){
    // split off direct term: bn/an = b[0]/a[0]=b[0]
    D = b[0];
    // new num = b - D*a, drop leading
    bAdj = [];
    for(let i = 0; i < b.length; i++) bAdj.push(b[i] - D*a[i]);
    bAdj = trimLeadingZeros(bAdj);
  }

  // pad bAdj to length n (lowest power last)
  // bAdj is descending order, currently length <= n
  const bPadded = new Array(n).fill(0);
  // bAdj[i] is coefficient of s^(bAdj.length-1-i)
  for(let i = 0; i < bAdj.length; i++){
    const power = bAdj.length - 1 - i;
    if(power >= 0 && power < n){
      // position in C: index for s^power is (n-1-power)
      // We'll fill C below directly
    }
  }
  // Build A
  const A = [];
  for(let i = 0; i < n; i++){
    const row = new Array(n).fill(0);
    if(i < n-1) row[i+1] = 1;
    if(i === n-1){
      // last row: -a_n, -a_{n-1}, ..., -a_1
      // a = [1, a1, a2, ..., an], so a_k = a[k]
      for(let k = 0; k < n; k++){
        row[k] = -a[n - k];
      }
    }
    A.push(row);
  }
  // Build B
  const B = new Array(n).fill(0);
  B[n-1] = 1;
  // Build C: state x = [x1, x2,..., xn]^T where xi = (i-1)th derivative of "fictitious" input
  // C[k] corresponds to coefficient of s^k in numerator (k from 0 .. n-1)
  // bAdj is descending; convert to ascending
  const bAsc = new Array(n).fill(0);
  for(let i = 0; i < bAdj.length; i++){
    const power = bAdj.length - 1 - i;
    if(power >= 0 && power < n) bAsc[power] = bAdj[i];
  }
  // Standard CCF: y = [bAsc[0], bAsc[1], ..., bAsc[n-1]] * x  + D*u
  const C = bAsc.slice();

  return {A, B, C, D, n};
}

/* ---------- Matrix-vector helpers ---------- */
function matVec(A, x){
  const n = A.length;
  const out = new Array(n).fill(0);
  for(let i = 0; i < n; i++){
    let s = 0;
    const row = A[i];
    for(let j = 0; j < row.length; j++) s += row[j] * x[j];
    out[i] = s;
  }
  return out;
}
function vecAdd(a, b){ return a.map((v,i) => v + b[i]); }
function vecScale(a, k){ return a.map(v => v*k); }
function dotVec(a, b){
  let s = 0;
  for(let i = 0; i < a.length; i++) s += a[i]*b[i];
  return s;
}

/* ---------- Simulator core ---------- */
function simulate(params){
  const {numCoefs, denCoefs, L, Kp, Ki, Kd, Nf, Tstop, dt, ref} = params;

  // Build plant state-space
  const {A, B, C, D, n} = tf2ss(numCoefs, denCoefs);

  // Controller state: I (integral of error), Df (filtered derivative state)
  // Realize Kd*s/(1+s/N) as:  Df_dot = -N*Df + N*N*Kd*e ;  u_d = -Df + N*Kd*e
  // Equivalent: y_d(s) = (Kd*N*s)/(s+N) * e(s)
  // Use state form: xd_dot = -N * xd + N * e ; u_d = Kd*N*(e - xd)
  // (That's simpler.)
  //   xd_dot = -N*xd + N*e
  //   u_d    = Kd*N*(e - xd)
  // This is the standard "derivative on error with low-pass filter".

  const steps = Math.max(1, Math.ceil(Tstop / dt));
  const t = new Array(steps+1);
  const y = new Array(steps+1);
  const u = new Array(steps+1);
  const r = new Array(steps+1);

  // delay buffer: store past u values
  const delaySamples = Math.max(0, Math.round(L / dt));
  const buf = new Array(delaySamples + 1).fill(0);
  let bufIdx = 0;
  function pushDelay(val){
    buf[bufIdx] = val;
    bufIdx = (bufIdx + 1) % buf.length;
  }
  function readDelay(){
    // value from `delaySamples` steps ago = current write position before increment
    return buf[bufIdx]; // since bufIdx points to oldest after wrap
  }

  // States
  let x = new Array(n).fill(0);   // plant
  let xi = 0;                     // integrator state for Ki
  let xd = 0;                     // derivative filter state

  // Derivative function for RK4
  // state vector z = [x (n), xi, xd]
  // input: reference r, current control u_current is computed from state itself,
  // because u depends on e = r - y, and y = C*x + D*u_delayed.
  // For dead time, the plant input we feed in is u_delayed (computed externally
  // before the RK4 step via the ring buffer). We treat u_delayed as a piecewise-
  // constant input over the dt step.
  //
  // So per step:
  //   1. Read u_delayed from buffer
  //   2. Compute current y = C*x + D*u_delayed
  //   3. Compute current error e = r - y
  //   4. Compute current u = Kp*e + Ki*xi + Kd*N*(e - xd)
  //   5. Push u into buffer (it will emerge after L seconds)
  //   6. Integrate state with RK4 holding (u_delayed, e) ~constant over dt
  //
  // For controller state derivatives, we treat e as constant over dt (suitably small).

  function f_plant(xv, u_in){
    // x_dot = A*x + B*u_in
    return vecAdd(matVec(A, xv), vecScale(B, u_in));
  }

  t[0] = 0;
  r[0] = ref;
  const y0 = dotVec(C, x) + D * 0;
  y[0] = y0;
  const e0 = ref - y0;
  const u0 = Kp*e0 + Ki*xi + Kd*Nf*(e0 - xd);
  u[0] = u0;
  pushDelay(u0);

  for(let k = 1; k <= steps; k++){
    // current time
    const tk = k * dt;

    // 1. Read delayed plant input
    const u_delayed = readDelay();

    // 2. RK4 on plant state with constant u_delayed
    const k1 = f_plant(x, u_delayed);
    const x2 = vecAdd(x, vecScale(k1, dt/2));
    const k2 = f_plant(x2, u_delayed);
    const x3 = vecAdd(x, vecScale(k2, dt/2));
    const k3 = f_plant(x3, u_delayed);
    const x4 = vecAdd(x, vecScale(k3, dt));
    const k4 = f_plant(x4, u_delayed);
    x = vecAdd(x, vecScale(vecAdd(vecAdd(k1, vecScale(k2,2)), vecAdd(vecScale(k3,2), k4)), dt/6));

    // 3. New plant output
    const yk = dotVec(C, x) + D * u_delayed;

    // 4. Controller: integrator and derivative filter — integrate with the
    //    error at this NEW output (using current ref r=const for step input).
    const rk = ref;
    const e_new = rk - yk;

    // Trapezoidal-ish: use average error for integrator (Tustin)
    const e_prev = r[k-1] - y[k-1];
    xi += 0.5 * (e_new + e_prev) * dt;

    // Derivative filter:  xd_dot = -N*xd + N*e   (use new e)
    // Backward-Euler for stability with large N:
    // xd_new = (xd + N*dt*e_new) / (1 + N*dt)
    xd = (xd + Nf * dt * e_new) / (1 + Nf * dt);

    // 5. Control output
    const uk = Kp*e_new + Ki*xi + Kd*Nf*(e_new - xd);

    // Anti-windup: simple clamp guard against blow-up (large finite limit)
    const U_MAX = 1e9;
    let uk_clamped = uk;
    if(uk > U_MAX) uk_clamped = U_MAX;
    else if(uk < -U_MAX) uk_clamped = -U_MAX;

    // 6. Push into delay buffer (for the NEXT step)
    pushDelay(uk_clamped);

    t[k] = tk;
    r[k] = rk;
    y[k] = yk;
    u[k] = uk_clamped;

    if(!Number.isFinite(yk) || Math.abs(yk) > 1e15){
      // diverged — fill remainder with NaN-ish marker
      for(let j = k+1; j <= steps; j++){
        t[j] = j*dt; r[j] = rk; y[j] = NaN; u[j] = NaN;
      }
      return {t, y, u, r, diverged: true};
    }
  }

  return {t, y, u, r, diverged: false};
}

/* ---------- Metrics ---------- */
function computeMetrics(t, y, ref){
  if(!y.length) return {};
  let yss = y[y.length-1];
  // average last 2% of samples for steady state estimate if available
  const tail = Math.max(1, Math.floor(y.length * 0.02));
  let sum = 0, cnt = 0;
  for(let i = y.length - tail; i < y.length; i++){
    if(Number.isFinite(y[i])){ sum += y[i]; cnt++; }
  }
  if(cnt > 0) yss = sum / cnt;

  // peak / overshoot
  let peak = -Infinity, peakIdx = 0;
  for(let i = 0; i < y.length; i++){
    if(Number.isFinite(y[i]) && y[i] > peak){ peak = y[i]; peakIdx = i; }
  }

  let overshoot = NaN;
  if(Number.isFinite(peak) && Number.isFinite(yss) && Math.abs(yss) > 1e-12){
    overshoot = Math.max(0, (peak - yss) / yss * 100);
  } else if(Number.isFinite(peak) && Math.abs(ref) > 1e-12){
    overshoot = Math.max(0, (peak - ref) / ref * 100);
  }

  // rise time 10% -> 90% of yss (or of ref if yss invalid)
  const target = Number.isFinite(yss) ? yss : ref;
  let t10 = NaN, t90 = NaN;
  const lo = 0.1 * target, hi = 0.9 * target;
  // assume monotone-ish rise; first crossings
  const sign = target >= 0 ? 1 : -1;
  for(let i = 1; i < y.length; i++){
    if(!Number.isFinite(y[i])) continue;
    if(Number.isNaN(t10) && sign * y[i] >= sign * lo){
      // linear interp
      const y0v = y[i-1], y1v = y[i];
      const frac = (lo - y0v) / (y1v - y0v || 1e-12);
      t10 = t[i-1] + frac * (t[i] - t[i-1]);
    }
    if(Number.isNaN(t90) && sign * y[i] >= sign * hi){
      const y0v = y[i-1], y1v = y[i];
      const frac = (hi - y0v) / (y1v - y0v || 1e-12);
      t90 = t[i-1] + frac * (t[i] - t[i-1]);
      break;
    }
  }
  const rise = (Number.isFinite(t10) && Number.isFinite(t90)) ? (t90 - t10) : NaN;

  // settling time 2% band around yss (or ref)
  const band = 0.02 * Math.abs(target);
  let settle = NaN;
  if(Number.isFinite(target) && band > 0){
    let lastOut = -1;
    for(let i = 0; i < y.length; i++){
      if(!Number.isFinite(y[i])) { lastOut = i; continue; }
      if(Math.abs(y[i] - target) > band) lastOut = i;
    }
    if(lastOut >= 0 && lastOut < y.length - 1) settle = t[lastOut+1];
    else if(lastOut === -1) settle = 0;
    // if lastOut === last index, never settled
    if(lastOut === y.length - 1) settle = NaN;
  }

  const sserr = Number.isFinite(yss) ? (ref - yss) : NaN;

  return { rise, overshoot, settle, yss, sserr, peak, peakIdx };
}

/* ---------- Rendering: TF display (removed from UI; no-op) ---------- */
function updateTFDisplay(numC, denC, L, Kp, Ki, Kd){ /* no-op */ }

/* ---------- Rendering: plot ---------- */
const canvas = document.getElementById("plot");
const ctx = canvas.getContext("2d");
const tip = document.getElementById("tip");

let plotData = null;

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", () => { resizeCanvas(); drawPlot(); });

function getPlotBounds(){
  const rect = canvas.getBoundingClientRect();
  const padL = 56, padR = 18, padT = 22, padB = 42;
  return {
    x: padL, y: padT,
    w: rect.width - padL - padR,
    h: rect.height - padT - padB,
    fullW: rect.width, fullH: rect.height
  };
}

function niceTicks(min, max, target=6){
  const range = max - min;
  if(range <= 0) return [min];
  const rough = range / target;
  const pow10 = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / pow10;
  let step;
  if(norm < 1.5) step = 1 * pow10;
  else if(norm < 3) step = 2 * pow10;
  else if(norm < 7) step = 5 * pow10;
  else step = 10 * pow10;
  const ticks = [];
  const start = Math.ceil(min / step) * step;
  for(let v = start; v <= max + step*0.0001; v += step){
    ticks.push(Math.round(v / step) * step);
  }
  return ticks;
}

function drawPlot(){
  if(!canvas.getBoundingClientRect().width) return;
  resizeCanvas();
  const B = getPlotBounds();
  // clear with white background
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, B.fullW, B.fullH);

  if(!plotData){
    drawGrid(B, [0, 5, 10], [0, 0.5, 1], (v)=>v.toFixed(1), (v)=>v.toFixed(2));
    return;
  }

  const { t, y } = plotData;

  // y-range
  let yMin = Infinity, yMax = -Infinity;
  for(const v of y){ if(Number.isFinite(v)){ if(v < yMin) yMin = v; if(v > yMax) yMax = v; } }
  if(!Number.isFinite(yMin) || !Number.isFinite(yMax)){ yMin = -1; yMax = 1; }
  if(yMax - yMin < 1e-9){ yMax += 0.5; yMin -= 0.5; }
  const yPad = (yMax - yMin) * 0.08;
  yMin -= yPad; yMax += yPad;

  const tMin = t[0], tMax = t[t.length-1];

  const xTicks = niceTicks(tMin, tMax, 7);
  const yTicks = niceTicks(yMin, yMax, 6);

  drawGrid(B, xTicks, yTicks, (v)=>formatNum(v), (v)=>formatNum(v), tMin, tMax, yMin, yMax);

  function px(tv){ return B.x + (tv - tMin)/(tMax - tMin) * B.w; }
  function py(yv){ return B.y + B.h - (yv - yMin)/(yMax - yMin) * B.h; }

  // y trace — MATLAB blue
  ctx.save();
  ctx.strokeStyle = "#0072BD";
  ctx.lineWidth = 1.6;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  let started = false;
  for(let i = 0; i < t.length; i++){
    if(!Number.isFinite(y[i])) { started = false; continue; }
    const X = px(t[i]), Y = py(y[i]);
    if(!started){ ctx.moveTo(X, Y); started = true; }
    else ctx.lineTo(X, Y);
  }
  ctx.stroke();
  ctx.restore();

  // axis labels
  ctx.fillStyle = "#262626";
  ctx.font = "11px 'Space Grotesk', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Time (seconds)", B.x + B.w/2, B.y + B.h + 26);
  ctx.save();
  ctx.translate(14, B.y + B.h/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText("Amplitude", 0, 0);
  ctx.restore();

  // title
  ctx.fillStyle = "#262626";
  ctx.font = "600 12px 'Space Grotesk', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Step Response", B.x + B.w/2, B.y - 4);

  // store mapping for tooltips
  plotData.__map = { px, py, tMin, tMax, yMin, yMax, B };
}

function drawGrid(B, xTicks, yTicks, fmtX, fmtY, tMin, tMax, yMin, yMax){
  // axis frame (dark thin)
  ctx.strokeStyle = "#262626";
  ctx.lineWidth = 0.8;
  ctx.strokeRect(B.x, B.y, B.w, B.h);

  if(tMin === undefined){ tMin = xTicks[0]; tMax = xTicks[xTicks.length-1]; }
  if(yMin === undefined){ yMin = yTicks[0]; yMax = yTicks[yTicks.length-1]; }
  function px(v){ return B.x + (v - tMin)/(tMax - tMin) * B.w; }
  function py(v){ return B.y + B.h - (v - yMin)/(yMax - yMin) * B.h; }

  // gridlines — light gray
  ctx.strokeStyle = "#e6e6e6";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(const xt of xTicks){
    const X = px(xt);
    if(X <= B.x + 0.5 || X >= B.x + B.w - 0.5) continue;
    ctx.moveTo(X, B.y);
    ctx.lineTo(X, B.y + B.h);
  }
  for(const yt of yTicks){
    const Y = py(yt);
    if(Y <= B.y + 0.5 || Y >= B.y + B.h - 0.5) continue;
    ctx.moveTo(B.x, Y);
    ctx.lineTo(B.x + B.w, Y);
  }
  ctx.stroke();

  // tick marks + labels — dark
  ctx.fillStyle = "#262626";
  ctx.strokeStyle = "#262626";
  ctx.font = "10.5px 'Space Grotesk', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  for(const xt of xTicks){
    const X = px(xt);
    if(X < B.x - 0.5 || X > B.x + B.w + 0.5) continue;
    // tick mark
    ctx.beginPath();
    ctx.moveTo(X, B.y + B.h);
    ctx.lineTo(X, B.y + B.h + 4);
    ctx.stroke();
    ctx.fillText(fmtX(xt), X, B.y + B.h + 7);
  }
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for(const yt of yTicks){
    const Y = py(yt);
    if(Y < B.y - 0.5 || Y > B.y + B.h + 0.5) continue;
    ctx.beginPath();
    ctx.moveTo(B.x, Y);
    ctx.lineTo(B.x - 4, Y);
    ctx.stroke();
    ctx.fillText(fmtY(yt), B.x - 7, Y);
  }

  // zero line emphasis if visible (slightly darker gray)
  if(yMin < 0 && yMax > 0){
    ctx.strokeStyle = "#bdbdbd";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(B.x, py(0));
    ctx.lineTo(B.x + B.w, py(0));
    ctx.stroke();
  }
}

/* ---------- Tooltip on canvas ---------- */
canvas.addEventListener("mousemove", (e) => {
  if(!plotData || !plotData.__map) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { tMin, tMax, B } = plotData.__map;
  if(mx < B.x || mx > B.x + B.w || my < B.y || my > B.y + B.h){
    tip.classList.remove("show");
    return;
  }
  const tv = tMin + (mx - B.x)/B.w * (tMax - tMin);
  const t = plotData.t;
  let lo = 0, hi = t.length - 1;
  while(lo < hi){
    const mid = (lo + hi) >> 1;
    if(t[mid] < tv) lo = mid + 1; else hi = mid;
  }
  const i = lo;
  const yv = plotData.y[i];
  tip.style.left = (e.clientX) + "px";
  tip.style.top  = (e.clientY) + "px";
  tip.innerHTML = `t = ${formatNum(t[i])}s &nbsp; y = ${formatNum(yv)}`;
  tip.classList.add("show");
});
canvas.addEventListener("mouseleave", () => tip.classList.remove("show"));

/* ---------- Input handling ---------- */
const ids = ["num","den","delay","kp","ki","kd","nfilt","tstop","dt","ref"];
const inputs = {};
ids.forEach(id => inputs[id] = document.getElementById(id));

function readInputs(){
  const numCoefs = parseCoefs(inputs.num.value);
  const denCoefs = parseCoefs(inputs.den.value);
  const L = Number(inputs.delay.value) || 0;
  const Kp = Number(inputs.kp.value) || 0;
  const Ki = Number(inputs.ki.value) || 0;
  const Kd = Number(inputs.kd.value) || 0;
  const Nf = Math.max(1, Number(inputs.nfilt.value) || 100);
  const Tstop = Math.max(0.001, Number(inputs.tstop.value) || 10);
  const dt = Math.max(1e-6, Number(inputs.dt.value) || 0.01);
  const ref = Number(inputs.ref.value);
  if(!numCoefs.length) throw new Error("numerator empty");
  if(!denCoefs.length) throw new Error("denominator empty");
  if(dt > Tstop) throw new Error("dt > stop time");
  if(Tstop / dt > 500000) throw new Error("too many samples (Tstop/dt > 5×10⁵). Increase dt.");
  return { numCoefs, denCoefs, L, Kp, Ki, Kd, Nf, Tstop, dt, ref };
}

function setStatus(text, mode){ /* status pill removed; no-op */ }
function showError(msg){
  const eb = document.getElementById("errbox");
  eb.innerText = msg;
  eb.classList.add("show");
}
function clearError(){
  document.getElementById("errbox").classList.remove("show");
}

function setMetric(id, val, decimals=3){
  const el = document.getElementById(id);
  if(!Number.isFinite(val)) { el.innerText = "—"; return; }
  el.innerText = val.toFixed(decimals);
}

function runSim(){
  clearError();
  try {
    const p = readInputs();
    updateTFDisplay(p.numCoefs, p.denCoefs, p.L, p.Kp, p.Ki, p.Kd);

    const res = simulate(p);
    plotData = res;
    drawPlot();

    if(res.diverged){
      setStatus("Diverged", "warn");
    } else {
      setStatus("Simulated · " + (res.t.length-1) + " steps", null);
    }

    const m = computeMetrics(res.t, res.y, p.ref);
    setMetric("m_rise", m.rise, 3);
    setMetric("m_os",   m.overshoot, 2);
    setMetric("m_ts",   m.settle, 3);
    setMetric("m_ss",   m.yss, 4);
    setMetric("m_err",  m.sserr, 4);

  } catch(err){
    showError(err.message);
    plotData = null;
    drawPlot();
  }
}

/* ---------- Bindings ---------- */
document.getElementById("runBtn").addEventListener("click", runSim);

document.getElementById("resetBtn").addEventListener("click", () => {
  inputs.num.value = "1";
  inputs.den.value = "1 2 1";
  inputs.delay.value = "0";
  inputs.kp.value = "1";
  inputs.ki.value = "0";
  inputs.kd.value = "0";
  inputs.nfilt.value = "100";
  inputs.tstop.value = "10";
  inputs.dt.value = "0.01";
  inputs.ref.value = "1";
  runSim();
});

// Enter key in any input triggers simulate
ids.forEach(id => {
  inputs[id].addEventListener("keydown", e => {
    if(e.key === "Enter") runSim();
  });
});

// Initial run
window.addEventListener("load", () => {
  resizeCanvas();
  runSim();
});
</script>
